name: Actualizar página de noticias

on:
  push:
    branches: [main]
    paths:
      - 'noticias.pdf'

jobs:
  generar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pdfplumber

      - name: Generar HTML desde PDF
        run: python generate.py

      - name: Publicar HTML actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Noticias del $(date +'%d/%m/%Y')"
          git push
